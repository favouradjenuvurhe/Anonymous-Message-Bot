name: Anonymous Message Bot

on:
  workflow_dispatch:

  schedule:
    - cron: "*/2 * * * *"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Requests
        run: pip install requests

      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python bot.py

      - name: Commit Data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add users.json
          git add messages.json
          git add offset.txt

          git commit -m "bot update" || exit 0

          git pull --rebase origin main

          git push
